# ── igraph Baseline ─────────────────────────────────────────────────────────

[tasks.install-igraph]
description = "Install python-igraph + leidenalg into .venv/ via uv"
script = [
  """
    set -e
    if ! command -v uv >/dev/null 2>&1; then
      echo "Error: uv is not installed. Install it with: curl -LsSf https://astral.sh/uv/install.sh | sh"
      exit 1
    fi
    uv venv .venv
    uv pip install --python .venv/bin/python python-igraph leidenalg
    echo "igraph + leidenalg installed in .venv/"
  """,
]

[tasks.benchmark-igraph]
description = "Run benchmark on ca-HepTh with igraph comparison"
dependencies = [
