[config]
default_to_workspace = false

[env]
BENCH    = "hit_leiden_suite"
BENCH_FN = "hit_leiden_run_throughput"
CA_HEPTH = "data/ca-HepTh/ca-HepTh"
UK_2007  = "data/uk-2007-05@100000/uk-2007-05@100000"

# ── Data ─────────────────────────────────────────────────────────────────────

[tasks.data]
description = "Download the uk-2007-05@100000 benchmark dataset (used by profile_run/profile_incremental binaries)"
script = [
  "bash scripts/download_uk_2007.sh",
]

[tasks.data-ca-hepth]
description = "Download the ca-HepTh dataset from SNAP (used by hit-leiden benchmark)"
script = [
  "bash scripts/download_ca_hepth.sh",
]

# ── Build ────────────────────────────────────────────────────────────────────

[tasks.bench-build]
# Uses the bench profile (debug = true) so profilers can resolve symbols.
# cargo build --release would use the release profile and strip symbols.
description = "Build the benchmark binary using the bench profile (debug symbols intact)"
command = "cargo"
args = [
  "bench",
  "--no-run",
  "--bench",
  "${BENCH}",
]

[tasks.build-profiling]
description = "Build the hit-leiden binary with profiling feature (release)"
command = "cargo"
args = [
  "build",
  "--release",
  "--features",
  "profiling",
  "--bin",
  "hit-leiden",
]

# ── Criterion Bench ──────────────────────────────────────────────────────────

[tasks.bench]
description = "Run Criterion benchmarks (release, no profiling)"
command = "cargo"
args = [
  "bench",
  "--bench",
  "${BENCH}",
]

