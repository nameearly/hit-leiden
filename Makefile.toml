# ── Profile Session Management ───────────────────────────────────────────────

[tasks.profile-list]
description = "List available profile sessions with timestamps and sizes"
script = [
  """
    echo "Available profile sessions:"
    echo "─────────────────────────────────────────────────────────────"
    if [ -d artifacts/profiling ]; then
      for dir in artifacts/profiling/profile_*/; do
        [ -d "$dir" ] || continue
        name=$(basename "$dir")
        size=$(du -sh "$dir" 2>/dev/null | cut -f1)
        files=$(ls "$dir" 2>/dev/null | tr '\n' ', ' | sed 's/,$//')
        printf "  %-50s  %6s  [%s]\n" "$name" "$size" "$files"
      done
    else
      echo "  (no profile sessions found — run profile-perf or profile-samply first)"
    fi
  """,
]

[tasks.profile-latest-export]
description = "Export the most recent profile session as TOON text"
dependencies = [
  "build-profiling",
]
script = [
  """
    latest=$(ls -dt artifacts/profiling/profile_*/ 2>/dev/null | head -1)
    if [ -z "$latest" ]; then
      echo "No profile sessions found. Run profile-perf or profile-samply first."
      exit 1
    fi

    # Prefer .pb.gz (perf), fall back to .json.gz (samply)
    input=$(ls "$latest"profile.pb.gz 2>/dev/null || ls "$latest"profile.json.gz 2>/dev/null || true)
    if [ -z "$input" ]; then
      echo "No exportable profile found in $latest"
      echo "Expected profile.pb.gz or profile.json.gz"
      exit 1
    fi

    echo "Exporting: $input"
    cargo run --release --features profiling --bin hit-leiden -- profile export --input "$input"
  """,
]

# ── TOON Export ──────────────────────────────────────────────────────────────

# Usage: cargo make profile-export PROFILE_INPUT=artifacts/profiling/profile_run_<timestamp>/profile.pb.gz
[tasks.profile-export]
description = "Export profiling data as TOON text (set PROFILE_INPUT env var)"
dependencies = [
  "build-profiling",
]
script = [
  """
    if [ -z "${PROFILE_INPUT:-}" ]; then
      echo "Usage: cargo make profile-export PROFILE_INPUT=<path to .pb.gz or .json.gz>"
      echo ""
      echo "Available profile sessions:"
      ls -d artifacts/profiling/profile_*/ 2>/dev/null || echo "  (none found — run profile-perf or profile-samply first)"
      exit 1
    fi
    cargo run --release --features profiling --bin hit-leiden -- profile export --input "$PROFILE_INPUT"
  """,
]

# Usage: cargo make profile-compare PROFILE_BASELINE=<path> PROFILE_CANDIDATE=<path>
[tasks.profile-compare]
description = "Compare two profiling runs as TOON diff (set PROFILE_BASELINE and PROFILE_CANDIDATE env vars)"
dependencies = [
  "build-profiling",
]
script = [
  """
    if [ -z "${PROFILE_BASELINE:-}" ] || [ -z "${PROFILE_CANDIDATE:-}" ]; then
      echo "Usage: cargo make profile-compare PROFILE_BASELINE=<path> PROFILE_CANDIDATE=<path>"
      echo ""
      echo "Available profile sessions:"
      ls -d artifacts/profiling/profile_*/ 2>/dev/null || echo "  (none found — run profile-perf or profile-samply first)"
      exit 1
    fi
    cargo run --release --features profiling --bin hit-leiden -- profile compare \
      --baseline "$PROFILE_BASELINE" --candidate "$PROFILE_CANDIDATE"
  """,
]

# ── Throughput vs Deterministic Comparison ─────────────────────────────────────

[tasks.benchmark-compare-modes-uk]
description = "Compare deterministic vs throughput on uk-2007-05@100000 (deterministic = baseline)"
dependencies = [
  "data",
  "build-profiling",
]
script = [
  """
    set -e
    DET_DIR="artifacts/benchmark/deterministic"
    THR_DIR="artifacts/benchmark/throughput"
    mkdir -p "$DET_DIR" "$THR_DIR"

    echo "=== Running deterministic mode (baseline) ==="
    cargo run --release --features profiling --bin hit-leiden -- \
      benchmark --source file --path "${UK_2007}" \
      --mode deterministic --no-igraph \
      --output-dir "$DET_DIR" --format json

    echo ""
    echo "=== Running throughput mode (candidate) ==="
    cargo run --release --features profiling --bin hit-leiden -- \
      benchmark --source file --path "${UK_2007}" \
      --mode throughput --no-igraph \
      --output-dir "$THR_DIR" --format json

    echo ""
    DET_JSON=$(ls -t "$DET_DIR"/benchmark_*.json 2>/dev/null | head -1)
    THR_JSON=$(ls -t "$THR_DIR"/benchmark_*.json 2>/dev/null | head -1)

    if [ -n "$DET_JSON" ] && [ -n "$THR_JSON" ]; then
      echo "=== Throughput vs Deterministic (baseline) ==="
      python3 - "$DET_JSON" "$THR_JSON" <<'PYEOF'
import json, sys
with open(sys.argv[1]) as f: det = json.load(f)
with open(sys.argv[2]) as f: thr = json.load(f)
hdr = "%-6s %-12s %-12s %-10s %-10s %-10s %-10s" % ("Batch", "Det(ms)", "Thr(ms)", "Speedup", "Det Q", "Thr Q", "DQ")
print(hdr)
print("-" * 70)
det_total, thr_total = 0.0, 0.0
for d, t in zip(det["batches"], thr["batches"]):
    det_total += d["hit_leiden_time_ms"]
    thr_total += t["hit_leiden_time_ms"]
    spd = d["hit_leiden_time_ms"] / t["hit_leiden_time_ms"] if t["hit_leiden_time_ms"] > 0 else 0
    dq = t["modularity"] - d["modularity"]
    print("%-6d %-12.2f %-12.2f %-10.2fx %-10.4f %-10.4f %+-10.5f" % (
        d["batch_idx"]+1, d["hit_leiden_time_ms"], t["hit_leiden_time_ms"],
        spd, d["modularity"], t["modularity"], dq))
cum_spd = det_total / thr_total if thr_total > 0 else 0
print("=" * 70)
print("Cumulative: det %.2fms  thr %.2fms  speedup %.2fx" % (det_total, thr_total, cum_spd))
PYEOF
    fi
  """,
]

