  "echo 'igraph cache cleared. Next benchmark run will re-compute igraph Leiden baseline.'",
]

# ── License Headers ──────────────────────────────────────────────────────────

[tasks.license-headers]
description = "Apply SPDX + copyright headers using addlicense"
script = [
  '''
    set -e
    if ! command -v addlicense >/dev/null 2>&1; then
      echo "Error: addlicense is not installed or not in PATH."
      echo "Install with: go install github.com/google/addlicense@latest"
      exit 1
    fi

    addlicense -v -y 2026 -c "Naadir Jeewa" -s \
      -ignore "target/**" \
      -ignore "artifacts/**" \
      -ignore "data/**" \
      -ignore ".git/**" \
      -ignore "LICENSE" \
      -ignore "LICENSE-*" \
      .
  ''',
]

# ── Cleanup ──────────────────────────────────────────────────────────────────

[tasks.incremental-clean]
description = "Remove incremental benchmark export artifacts"
script = [
  "rm -f artifacts/incremental/uk_2007_05_100000_incremental.csv artifacts/incremental/uk_2007_05_100000_incremental.json",
]

[tasks.clean-profile]
description = "Remove generated profile artifacts"
script = [
  "rm -f flamegraph.svg perf.data perf.data.old profile.json",
  "rm -rf artifacts/profiling/",
  "rm -f artifacts/incremental/uk_2007_05_100000_incremental.csv artifacts/incremental/uk_2007_05_100000_incremental.json",
]

[tasks.clean-benchmark]
description = "Remove benchmark output artifacts (preserves ST-Leiden and igraph caches)"
script = [
  '''
    find artifacts/benchmark/ -type f ! -name 'st_cache_*.json' ! -name 'igraph_cache_*.json' -delete 2>/dev/null || true
    find artifacts/benchmark/ -mindepth 1 -type d -empty -delete 2>/dev/null || true
    echo "Benchmark outputs removed (ST-Leiden and igraph caches preserved)."
  ''',
]

[tasks.clean-all]
description = "Remove all generated artifacts"
dependencies = [
  "clean-profile",
  "clean-benchmark",
  "incremental-clean",
]
